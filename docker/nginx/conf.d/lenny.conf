server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS so upstreams are resolved lazily (not at startup)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # For better debugging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;

    # Sensitive routes: tighter rate limits
    location ~ ^/v1/api/items/[^/]+/borrow {
        limit_req zone=borrow burst=3 nodelay;
        proxy_pass http://lenny_api:1337$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth callback — must always complete after provider redirect;
    # already protected by signed state cookie + single-use auth code.
    # Listed before the catch-all below so regex ordering picks this first.
    location ~ ^/v1/api/oauth/external/callback {
        proxy_pass http://lenny_api:1337$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # External OIDC flow start + status — rate-limited to slow abuse
    location ~ ^/v1/api/oauth/external {
        limit_req zone=oauth burst=5 nodelay;
        proxy_pass http://lenny_api:1337$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/api/oauth/authorize {
        limit_req zone=oauth burst=3 nodelay;
        proxy_pass http://lenny_api:1337/v1/api/oauth/authorize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /v1/api/upload {
        limit_req zone=upload burst=2 nodelay;
        proxy_pass http://lenny_api:1337/v1/api/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block admin API from external access — lenny-app calls FastAPI directly
    # on the internal Docker network (lenny_api:1337), bypassing nginx entirely.
    location /v1/api/admin {
        return 403;
    }

    # General API: 30 req/min
    location /v1/api {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://lenny_api:1337/v1/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1/api/docs {
        proxy_pass http://lenny_api:1337/docs;
    }

    location /v1/api/openapi.json {
        proxy_pass http://lenny_api:1337/openapi.json;
    }

    location = /openapi.json {
        proxy_pass http://lenny_api:1337/openapi.json;
    }

    location /read {
        proxy_pass http://lenny_reader:3000/read;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/css application/javascript application/json;
        sub_filter 'href="/' 'href="/read/';
        sub_filter 'src="/' 'src="/read/';
        sub_filter 'url("/' 'url("/read/';
        sub_filter_once off;
    }

    location /read/ {
        proxy_pass http://lenny_reader:3000$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reader Next.js API route for manifest domain verification
    location = /api/verify-manifest {
        proxy_pass http://lenny_reader:3000/api/verify-manifest;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI — resolver + variable forces lazy DNS resolution so nginx starts
    # even if lenny_admin isn't up yet.
    location /admin {
        set $admin_upstream lenny_admin:4000;
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /admin/ {
        set $admin_upstream lenny_admin:4000;
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/ {
        proxy_pass http://lenny_reader:3000/_next/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/__nextjs_ {
        proxy_pass http://lenny_reader:3000$request_uri;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /buy {
        proxy_pass https://openlibrary.press/;

        # Enable sub_filter module
        sub_filter_once off;

        sub_filter 'href="/' 'href="/buy/';
        sub_filter 'src="/' 'src="/buy/';

        proxy_set_header Host openlibrary.press;
        proxy_set_header User-Agent "Lenny/1.0";
        proxy_set_header X-Lenny-Callback "$scheme://$host/v1/api/upload";
    }

    location = /checkout {
        proxy_pass https://openlibrary.press/checkout;
        proxy_set_header Host openlibrary.press;
        proxy_set_header User-Agent "Lenny/1.0";
        proxy_set_header X-Lenny-Callback "$scheme://$host/v1/api/upload";
        proxy_set_header Accept-Encoding "";  # for sub_filter if needed
    }

    location /static {
        proxy_pass http://lenny_api:1337/static;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
